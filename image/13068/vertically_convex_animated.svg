<svg width="100%" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Vertically convex polygon scan animation</title>
<desc>A vertical scan line sweeps across a vertically convex polygon. Two dots track top(x) and bot(x), jumping at each vertical edge.</desc>
<g stroke="#D3D1C7" stroke-width="0.5" stroke-dasharray="2 3">
<line x1="158" y1="30" x2="158" y2="270"/>
<line x1="212" y1="30" x2="212" y2="270"/>
<line x1="320" y1="30" x2="320" y2="270"/>
<line x1="428" y1="30" x2="428" y2="270"/>
</g>
<polygon points="104,240 158,240 158,210 428,210 428,150 482,150 482,60 320,60 320,120 212,120 212,90 104,90" fill="#9FE1CB" stroke="#0F6E56" stroke-width="1.5"/>
<line x1="50" y1="270" x2="610" y2="270" stroke="#888780" stroke-width="0.5"/>
<line x1="50" y1="30" x2="50" y2="270" stroke="#888780" stroke-width="0.5"/>
<g font-family="sans-serif" fill="#5F5E5A" font-size="10">
<text x="50" y="288" text-anchor="middle">0</text>
<text x="104" y="288" text-anchor="middle">1</text>
<text x="158" y="288" text-anchor="middle">2</text>
<text x="212" y="288" text-anchor="middle">3</text>
<text x="320" y="288" text-anchor="middle">5</text>
<text x="428" y="288" text-anchor="middle">7</text>
<text x="482" y="288" text-anchor="middle">8</text>
<text x="590" y="288" text-anchor="middle">10</text>
</g>
<g font-family="sans-serif" fill="#04342C" font-size="11">
<text x="158" y="106" text-anchor="middle">top=6</text>
<text x="266" y="136" text-anchor="middle">top=5</text>
<text x="401" y="76" text-anchor="middle">top=7</text>
<text x="131" y="232" text-anchor="middle">bot=1</text>
<text x="293" y="202" text-anchor="middle">bot=2</text>
<text x="455" y="142" text-anchor="middle">bot=4</text>
</g>
<line x1="104" y1="30" x2="104" y2="270" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="4 3">
<animate attributeName="x1" values="104;482;482" keyTimes="0;0.85;1" dur="8s" repeatCount="indefinite"/>
<animate attributeName="x2" values="104;482;482" keyTimes="0;0.85;1" dur="8s" repeatCount="indefinite"/>
</line>
<line x1="104" y1="90" x2="104" y2="240" stroke="#993C1D" stroke-width="4" stroke-linecap="round">
<animate attributeName="x1" values="104;482;482" keyTimes="0;0.85;1" dur="8s" repeatCount="indefinite"/>
<animate attributeName="x2" values="104;482;482" keyTimes="0;0.85;1" dur="8s" repeatCount="indefinite"/>
<animate attributeName="y1" calcMode="discrete" keyTimes="0;0.243;0.486;1" values="90;120;60;60" dur="8s" repeatCount="indefinite"/>
<animate attributeName="y2" calcMode="discrete" keyTimes="0;0.121;0.729;1" values="240;210;150;150" dur="8s" repeatCount="indefinite"/>
</line>
<circle cx="104" cy="90" r="5" fill="#993C1D">
<animate attributeName="cx" values="104;482;482" keyTimes="0;0.85;1" dur="8s" repeatCount="indefinite"/>
<animate attributeName="cy" calcMode="discrete" keyTimes="0;0.243;0.486;1" values="90;120;60;60" dur="8s" repeatCount="indefinite"/>
</circle>
<circle cx="104" cy="240" r="5" fill="#993C1D">
<animate attributeName="cx" values="104;482;482" keyTimes="0;0.85;1" dur="8s" repeatCount="indefinite"/>
<animate attributeName="cy" calcMode="discrete" keyTimes="0;0.121;0.729;1" values="240;210;150;150" dur="8s" repeatCount="indefinite"/>
</circle>
</svg>
