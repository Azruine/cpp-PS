<svg width="100%" viewBox="0 0 680 185" xmlns="http://www.w3.org/2000/svg" role="img">
<title>F after reduce</title>
<desc>F now has five intervals: three unchanged non-maximals shown as gray bars, and two new shifted intervals shown as coral bars. |F| decreased from 6 to 5.</desc>
<g stroke="#D3D1C7" stroke-width="0.3" stroke-dasharray="2 3">
<line x1="104" y1="20" x2="104" y2="145"/>
<line x1="158" y1="20" x2="158" y2="145"/>
<line x1="212" y1="20" x2="212" y2="145"/>
<line x1="320" y1="20" x2="320" y2="145"/>
<line x1="428" y1="20" x2="428" y2="145"/>
<line x1="482" y1="20" x2="482" y2="145"/>
</g>
<rect x="104" y="30" width="54" height="14" fill="#F1EFE8" stroke="#888780" stroke-width="1" rx="2"/>
<text x="131" y="41" font-size="10" fill="#444441" text-anchor="middle" font-family="sans-serif">[1, 2]</text>
<rect x="158" y="48" width="54" height="14" fill="#F0997B" stroke="#993C1D" stroke-width="1" rx="2"/>
<text x="185" y="59" font-size="10" fill="#4A1B0C" text-anchor="middle" font-family="sans-serif">[2, 3]</text>
<rect x="212" y="66" width="108" height="14" fill="#F1EFE8" stroke="#888780" stroke-width="1" rx="2"/>
<text x="266" y="77" font-size="10" fill="#444441" text-anchor="middle" font-family="sans-serif">[3, 5]</text>
<rect x="320" y="84" width="108" height="14" fill="#F0997B" stroke="#993C1D" stroke-width="1" rx="2"/>
<text x="374" y="95" font-size="10" fill="#4A1B0C" text-anchor="middle" font-family="sans-serif">[5, 7]</text>
<rect x="428" y="102" width="54" height="14" fill="#F1EFE8" stroke="#888780" stroke-width="1" rx="2"/>
<text x="455" y="113" font-size="10" fill="#444441" text-anchor="middle" font-family="sans-serif">[7, 8]</text>
<line x1="50" y1="150" x2="590" y2="150" stroke="#888780" stroke-width="0.5"/>
<g font-size="10" fill="#5F5E5A" text-anchor="middle" font-family="sans-serif">
<text x="104" y="165">1</text>
<text x="158" y="165">2</text>
