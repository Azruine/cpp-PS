<svg width="100%" viewBox="0 0 680 215" xmlns="http://www.w3.org/2000/svg" role="img">
<title>F with bad interval s</title>
<desc>Six intervals of F shown as horizontal bars sorted by left endpoint. The bracket above marks s = [1, 8], a bad interval of F.</desc>
